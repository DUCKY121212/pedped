<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Roblox Profile</title>
    <style>
        /* ตั้งค่าพื้นฐาน */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #2b0000 0%, #000000 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* เอฟเฟคละอองลอยพื้นหลัง */
        .bg-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 0, 0, 0.1) 0%, transparent 70%);
            animation: pulse 8s infinite alternate;
            z-index: -1;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.3; }
            100% { transform: scale(1.5); opacity: 0.6; }
        }

        /* กล่องคอนเทนเนอร์หลัก */
        .container {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 0, 0, 0.2);
            border-radius: 30px;
            padding: 40px;
            width: 380px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* โลโก้ด้านบน */
        .header-logos {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .header-icon {
            width: 40px;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.5));
            transition: 0.3s;
        }

        /* กรอบรูปโปรไฟล์ */
        .profile-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .profile-wrapper::after {
            content: "";
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%;
            border: 2px dashed red;
            animation: rotate 10s linear infinite;
        }

        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 4px solid #ff0000;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
            position: relative;
            z-index: 1;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ข้อความ */
        h1 {
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px #ff0000;
            margin-bottom: 10px;
        }

        .description {
            font-size: 0.9rem;
            color: #cccccc;
            margin-bottom: 25px;
        }

        /* ปุ่มกด */
        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-roblox {
            background: linear-gradient(45deg, #000, #444);
            border-left: 4px solid #ffffff;
        }
        .btn-roblox:hover { border-left: 4px solid #ff0000; }

        .btn-discord {
            background: linear-gradient(45deg, #5865F2, #4752C4);
            border-left: 4px solid #ffffff;
        }

        .icon { width: 22px; }

    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="container">
    <div class="header-logos">
        <img class="header-icon" src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" style="filter: invert(1);">
        <img class="header-icon" src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
    </div>

    <div class="profile-wrapper">
        <img src="https://files.catbox.moe/o6shbi.png" class="profile-img" alt="Profile">
    </div>

    <h1>MY PROFILE 🔥</h1>
    <p class="description">ยินดีต้อนรับ! เลือกช่องทางติดต่อด้านล่าง</p>

    <div class="btn-list">
        <a class="btn btn-roblox" href="https://www.roblox.com/users/4230604675/profile" target="_blank">
            <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" style="filter: invert(1);">
            Add Friend Roblox
        </a>

        <a class="btn btn-discord" href="https://discord.gg/JmQgE3eSv" target="_blank">
            <img class="icon" src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
            Join Discord Community
        </a>
    </div>
</div>

</body>
</html>
