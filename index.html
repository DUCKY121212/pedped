<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VOID-CAT'S DEN Profile</title>
    <style>
        /* ตั้งค่าพื้นฐาน */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* พื้นหลังไล่เฉดสีดำแดง (Vortex) */
            background: radial-gradient(circle at center, #2e0000 0%, #000000 100%);
            background-size: cover;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* เอฟเฟคละอองลอยพื้นหลัง */
        .bg-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 0, 0, 0.15) 0%, transparent 70%);
            animation: pulseBg 8s infinite alternate;
            z-index: -1;
        }

        @keyframes pulseBg {
            0% { transform: scale(1); opacity: 0.4; }
            100% { transform: scale(1.6); opacity: 0.7; }
        }

        /* ตัวคอนเทนเนอร์หลัก (Glassmorphism) */
        .container {
            position: relative;
            background: rgba(255, 255, 255, 0.03); /* โปร่งแสง */
            backdrop-filter: blur(15px); /* เบลอพื้นหลัง */
            border: 2px solid rgba(255, 0, 0, 0.2); /* ขอบแดงจาง */
            border-radius: 30px;
            padding: 50px;
            width: 400px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* โลโก้ด้านบน */
        .header-logos {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 30px;
        }

        .header-icon {
            width: 45px;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.6));
            transition: 0.3s;
        }

        /* ส่วนโปรไฟล์ (Void-Cat) */
        .profile-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 25px;
        }

        /* เอฟเฟคเส้นประหมุนรอบโปรไฟล์ */
        .profile-wrapper::after {
            content: "";
            position: absolute;
            top: -6px; left: -6px; right: -6px; bottom: -6px;
            border-radius: 50%;
            border: 3px dashed #ff0000;
            animation: rotateProfileBorder 12s linear infinite;
        }

        /* รูปภาพโปรไฟล์ (Void-Cat) */
        .profile-img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 5px solid #ff0000; /* ขอบแดงเข้ม */
            object-fit: cover;
            /* ใช้ Filter เพื่อทำให้ตาแมวดูสว่าง */
            filter: brightness(1.2) contrast(1.1) drop-shadow(0 0 25px rgba(255, 0, 0, 0.8));
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.6);
            position: relative;
            z-index: 1;
        }

        @keyframes rotateProfileBorder {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* หัวข้อ MY PROFILE */
        h1 {
            font-size: 2rem;
            letter-spacing: 3px;
            color: #fff;
            text-shadow: 0 0 15px #ff0000;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* ข้อความอธิบาย */
        .description {
            font-size: 1rem;
            color: #dddddd;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* ส่วนปุ่มกด */
        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 16px;
            border-radius: 14px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn:hover {
            transform: scale(1.06) translateY(-4px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }

        /* ปุ่ม Roblox */
        .btn-roblox {
            background: linear-gradient(135deg, #111 0%, #333 100%);
            border-left: 5px solid #ffffff;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.15));
        }
        .btn-roblox:hover { border-left: 5px solid #ff0000; filter: drop-shadow(0 0 20px rgba(2ff, 0, 0, 0.3)); }

        /* ปุ่ม Discord */
        .btn-discord {
            background: linear-gradient(135deg, #5865F2 0%, #4752C4 100%);
            border-left: 5px solid #ffffff;
            filter: drop-shadow(0 0 10px rgba(88, 101, 242, 0.15));
        }
        .btn-discord:hover { filter: drop-shadow(0 0 20px rgba(88, 101, 242, 0.3)); }

        .btn-icon { width: 26px; }

    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="container">
    <div class="header-logos">
        <img class="header-icon" src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" style="filter: invert(1) drop-shadow(0 0 10px #fff);">
        <img class="header-icon" src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
    </div>

    <div class="profile-wrapper">
        <img src="https://files.catbox.moe/o6shbi.png" class="profile-img" alt="Void-Cat Profile">
    </div>

    <h1>MY PROFILE 🔥</h1>
    <p class="description">ยินดีต้อนรับสู่เดนของ Void-Cat! กดเลือกช่องทางติดต่อด้านล่าง 👇</p>

    <div class="btn-list">
        <a class="btn btn-roblox" href="https://www.roblox.com/users/4230604675/profile" target="_blank">
            <img class="btn-icon" src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" style="filter: invert(1);">
            Add Friend Roblox
        </a>

        <a class="btn btn-discord" href="https://discord.gg/JmQgE3eSv" target="_blank">
            <img class="btn-icon" src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
            Join Discord Community
        </a>
    </div>
</div>

</body>
</html>
