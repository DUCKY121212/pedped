<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Roblox Profile</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #1a0000, #000);
    color: white;
    text-align: center;
    overflow: hidden;
}

/* เอฟเฟคพื้นหลัง */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(red, transparent);
    animation: move 10s infinite linear;
    opacity: 0.1;
}
@keyframes move {
    0% {transform: translate(-25%, -25%);}
    50% {transform: translate(0%, 0%);}
    100% {transform: translate(-25%, -25%);}
}

/* กล่อง */
.container {
    position: relative;
    padding-top: 80px;
}

/* โลโก้ Roblox ด้านบน */
.roblox-logo {
    width: 80px;
    margin-bottom: 20px;
    filter: drop-shadow(0 0 10px red);
    transition: 0.3s;
}
.roblox-logo:hover {
    transform: scale(1.1);
    filter: drop-shadow(0 0 25px red);
}

/* โปรไฟล์ */
.profile {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 4px solid red;
    box-shadow: 0 0 25px red;
    object-fit: cover;
    transition: 0.3s;
}
.profile:hover {
    transform: scale(1.1);
    box-shadow: 0 0 40px red;
}

/* กล่องแนะนำตัว */
.card {
    background: rgba(255, 0, 0, 0.05);
    padding: 30px;
    border-radius: 20px;
    width: 320px;
    margin: 30px auto;
    box-shadow: 0 0 30px rgba(255,0,0,0.2);
}

/* ปุ่ม */
.btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 15px 0;
    padding: 15px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.roblox {
    background: #ff4655;
    color: white;
    box-shadow: 0 0 15px #ff4655;
}
.roblox:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px #ff4655;
}

.discord {
    background: #5865F2;
    color: white;
    box-shadow: 0 0 15px #5865F2;
}
.discord:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px #5865F2;
}

/* ไอคอน */
.icon {
    width: 25px;
    filter: drop-shadow(0 0 5px black);
}

/* ชื่อ */
h1 {
    color: red;
    text-shadow: 0 0 15px red;
}
</style>
</head>

<body>

<div class="container">

    <!-- โลโก้ Roblox ด้านบน -->
    <img class="roblox-logo" src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Roblox_Logo_2022.svg">

    <!-- โปรไฟล์ -->
    <img src="profile.png" class="profile">

    <h1>MY PROFILE 🔥</h1>

    <div class="card">
        <p>กดแอดเพื่อน หรือเข้าดิสด้านล่าง 👇</p>

        <!-- Roblox -->
        <a class="btn roblox" href="https://www.roblox.com/users/4230604675/profile" target="_blank">
            <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Roblox_Logo_2022.svg">
            Add Friend Roblox
        </a>

        <!-- Discord -->
        <a class="btn discord" href="https://discord.gg/JmQgE3eSv" target="_blank">
            <img class="icon" src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
            Join Discord
        </a>
    </div>

</div>

</body>
</html>
